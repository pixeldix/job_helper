name: Build fish 2560x1440

on:
  workflow_dispatch:
  push:
    paths:
      - 'fish/**'
      - 'shared/**'
      - '.github/workflows/build-fish-2560x1440.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        run: msbuild job_helper.sln /m /p:Configuration=release /p:Platform=x64

      - name: Upload fish artifact
        uses: actions/upload-artifact@v4
        with:
          name: fish-2560x1440-build
          path: |
            release/fish/**
            release/shared/**
          if-no-files-found: error
